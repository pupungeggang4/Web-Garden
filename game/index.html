<!DOCTYPE html>

        <script type="importmap">

                    "scenetitle": "./script/scenetitle.js",
                    "sceneselect": "./script/sceneselect.js",
                    "scenebattle": "./script/scenebattle.js",
                    "scenecollection": "./script/scenecollection.js",
